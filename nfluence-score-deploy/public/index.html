<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFLUENCE — Measure Your Influence</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120,80,255,0.08), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,240,255,0.04), transparent);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  /* HEADER */
  .header { text-align: center; margin-bottom: 40px; }
  .header .powered { font-size: 13px; letter-spacing: 6px; color: rgba(255,255,255,0.2); margin-bottom: 8px; font-weight: 300; }
  .header h1 {
    font-size: clamp(36px, 8vw, 56px); font-weight: 900; letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 0%, #00f0ff 50%, #a855f7 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header p { font-size: 15px; color: rgba(255,255,255,0.35); margin-top: 10px; font-weight: 300; max-width: 400px; line-height: 1.6; }

  /* INPUT */
  .input-wrap {
    display: flex; max-width: 480px; width: 100%; margin-bottom: 32px;
    border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden;
    background: rgba(255,255,255,0.03); box-shadow: 0 0 40px rgba(0,0,0,0.4);
    transition: border-color 0.3s;
  }
  .input-wrap:focus-within { border-color: rgba(168,85,247,0.4); }
  .input-wrap .at { padding: 0 16px; display: flex; align-items: center; color: rgba(255,255,255,0.2); font-size: 18px; font-weight: 600; }
  .input-wrap input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #fff; font-size: 16px; padding: 16px 0; font-family: 'JetBrains Mono', monospace;
  }
  .input-wrap input::placeholder { color: rgba(255,255,255,0.2); }
  .input-wrap button {
    background: linear-gradient(135deg, #a855f7, #00f0ff);
    border: none; color: #fff; padding: 0 28px; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: 2px; font-family: 'Outfit', sans-serif;
    transition: all 0.3s ease; white-space: nowrap;
  }
  .input-wrap button:disabled { background: rgba(255,255,255,0.06); cursor: wait; opacity: 0.4; }
  .input-wrap button:hover:not(:disabled) { opacity: 0.9; }

  .error-msg { color: #f97316; font-size: 13px; margin-bottom: 20px; font-family: 'JetBrains Mono', monospace; }

  /* LOADER */
  .loader { text-align: center; padding: 60px 40px; }
  .spinner {
    width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.08);
    border-top-color: #a855f7; border-radius: 50%; margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  .loader .status { font-size: 12px; color: rgba(255,255,255,0.35); font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  /* RESULTS */
  .results { max-width: 520px; width: 100%; animation: fadeUp 0.6s ease; }

  .profile-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
    padding: 20px 24px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
  }
  .profile-avatar {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900;
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-info .handle { font-size: 20px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-info .tier-badge { font-size: 11px; font-weight: 700; letter-spacing: 3px; margin-top: 4px; }
  .profile-score { font-size: 40px; font-weight: 900; line-height: 1; flex-shrink: 0; }

  .score-section { display: flex; gap: 24px; margin-bottom: 28px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .stats-col { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 160px; }
  .stat-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 14px 20px; text-align: center;
  }
  .stat-card .val { font-size: 20px; font-weight: 800; }
  .stat-card .lbl { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

  /* BREAKDOWN */
  .breakdown {
    padding: 24px; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; margin-bottom: 20px;
  }
  .section-title { font-size: 10px; color: rgba(255,255,255,0.25); letter-spacing: 4px; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; }

  .metric { margin-bottom: 18px; opacity: 0; transform: translateX(-16px); transition: all 0.5s ease; }
  .metric.visible { opacity: 1; transform: translateX(0); }
  .metric:last-child { margin-bottom: 0; }
  .metric .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .metric .label { font-size: 12px; color: rgba(255,255,255,0.6); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
  .metric .value { font-size: 14px; font-weight: 700; }
  .metric .track { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .metric .fill { height: 100%; border-radius: 3px; width: 0; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .metric .desc { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 5px; }

  /* CARDS */
  .card { padding: 20px 24px; border-radius: 16px; margin-bottom: 20px; }
  .ai-text { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.8; font-family: 'JetBrains Mono', monospace; white-space: pre-wrap; }
  .ai-loading { font-size: 12px; color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
  .verdict-text { font-size: 17px; font-weight: 700; line-height: 1.6; text-align: center; }

  .footer-label { text-align: center; font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 3px; margin-top: 8px; }
  .scan-again {
    display: block; margin: 24px auto 0; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4);
    padding: 10px 28px; border-radius: 10px; font-size: 11px; cursor: pointer;
    letter-spacing: 3px; font-family: 'Outfit', sans-serif; transition: all 0.2s;
  }
  .scan-again:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="powered">POWERED BY 1NFLUENC3</div>
  <h1>NFLUENCE SCORE</h1>
  <p>measure your influence power on crypto twitter</p>
</div>

<div class="input-wrap">
  <div class="at">@</div>
  <input id="handleInput" placeholder="enter twitter handle" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
  <button id="scanBtn" onclick="analyze()">SCAN</button>
</div>

<div id="errorMsg" class="error-msg hidden"></div>

<div id="loader" class="loader hidden">
  <div class="spinner"></div>
  <div class="status" id="statusMsg">fetching profile data...</div>
</div>

<div id="results" class="results hidden"></div>

<script>
const METRICS = [
  { key: "reach",       label: "REACH",       desc: "Follower quality & network size" },
  { key: "engagement",  label: "ENGAGEMENT",  desc: "Likes, replies, retweets ratio" },
  { key: "authority",   label: "AUTHORITY",   desc: "Niche credibility & mentions" },
  { key: "consistency", label: "CONSISTENCY", desc: "Posting frequency & reliability" },
  { key: "virality",    label: "VIRALITY",    desc: "Content spread potential" },
];

function getTier(score) {
  if (score >= 90) return { name: "VIRTUOSO",    color: "#ffd700" };
  if (score >= 75) return { name: "AUTHORITY",   color: "#a855f7" };
  if (score >= 60) return { name: "SPECIALIST",  color: "#00f0ff" };
  if (score >= 45) return { name: "AUTHOR",      color: "#3b82f6" };
  if (score >= 30) return { name: "CONTRIBUTOR", color: "#22c55e" };
  return              { name: "OBSERVER",    color: "#f97316" };
}

function normalizeScores(sorsa) {
  const score     = sorsa.score || 0;
  const followers = sorsa.followers_count || sorsa.followers || 0;
  const tweets    = sorsa.tweets_count    || sorsa.tweets    || 0;

  // Sorsa score (0–2000) → normalized 0–99
  const normalized  = Math.min(99, Math.round((score / 2000) * 100));

  // Each dimension uses a different signal so they're not identical
  const reach       = Math.min(99, Math.round((Math.log10(Math.max(followers, 1)) / 6) * 100));
  const engagement  = Math.min(99, Math.round(normalized * 0.75 + reach * 0.25));
  const authority   = Math.min(99, Math.round(normalized * 0.9 + (followers > 50000 ? 9 : followers > 10000 ? 5 : 0)));
  const consistency = Math.min(99, Math.round((Math.log10(Math.max(tweets, 1)) / 5) * 85));
  const virality    = Math.min(99, Math.round((reach * 0.55 + engagement * 0.45)));
  const overall     = Math.round((reach + engagement + authority + consistency + virality) / 5);

  return { overall, reach, engagement, authority, consistency, virality, followers, tweets, sorsaScore: score };
}

function getColor(v) {
  return v >= 75 ? "#00f0ff" : v >= 55 ? "#a855f7" : v >= 40 ? "#3b82f6" : "#f97316";
}

function getVerdict(score) {
  if (score >= 90) return "top-tier influence. the timeline moves when you post.";
  if (score >= 75) return "established authority. your voice shapes the narrative.";
  if (score >= 60) return "recognized specialist. consistent impact across CT.";
  if (score >= 45) return "rising author. your content is gaining traction.";
  if (score >= 30) return "active contributor. building presence one post at a time.";
  return "observer mode. time to start making noise.";
}

// --- UI helpers ---
function show(id)  { document.getElementById(id).classList.remove("hidden"); }
function hide(id)  { document.getElementById(id).classList.add("hidden"); }
function setStatus(msg) { document.getElementById("statusMsg").textContent = msg; }

document.getElementById("handleInput").addEventListener("keydown", e => {
  if (e.key === "Enter") analyze();
});

// --- Main flow ---
async function analyze() {
  const input = document.getElementById("handleInput");
  const clean = input.value.replace("@", "").trim();
  if (!clean) return;

  const btn = document.getElementById("scanBtn");
  btn.disabled = true; btn.textContent = "...";
  hide("errorMsg"); hide("results");
  show("loader"); setStatus("fetching profile data...");

  try {
    const res = await fetch(`/api/score/${encodeURIComponent(clean)}`);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `API error ${res.status}`);
    }
    const sorsaData = await res.json();
    const scores    = normalizeScores(sorsaData);

    setStatus("calculating influence score...");
    await delay(600);

    hide("loader");
    renderResults(clean, scores, sorsaData);
    show("results");

    // AI analysis runs async, updates the card when done
    fetchAiAnalysis(clean, scores, sorsaData);

  } catch (err) {
    hide("loader");
    const el = document.getElementById("errorMsg");
    el.textContent = err.message || "could not fetch profile. check the handle and try again.";
    show("errorMsg");
  }

  btn.disabled = false; btn.textContent = "SCAN";
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// --- Render ---
function renderResults(handle, scores, raw) {
  const tier = getTier(scores.overall);
  const circ = 2 * Math.PI * 90;
  const offset = circ - (scores.overall / 100) * circ;

  document.getElementById("results").innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar" style="background:linear-gradient(135deg,${tier.color}30,${tier.color}08);border:2px solid ${tier.color}35;color:${tier.color}">${tier.name[0]}</div>
      <div class="profile-info">
        <div class="handle">@${handle}</div>
        <div class="tier-badge" style="color:${tier.color}">${tier.name} TIER</div>
      </div>
      <div class="profile-score" style="color:${tier.color};text-shadow:0 0 24px ${tier.color}50" id="headerScore">${scores.overall}</div>
    </div>

    <div class="score-section">
      <div style="position:relative;width:200px;height:200px;flex-shrink:0">
        <svg width="200" height="200" style="transform:rotate(-90deg)">
          <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
          <circle cx="100" cy="100" r="90" fill="none" stroke="${tier.color}" stroke-width="8"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ}" stroke-linecap="round"
            style="transition:stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 0 14px ${tier.color}70)"
            id="scoreRing"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span id="animScore" style="font-size:56px;font-weight:800;color:${tier.color};font-family:'Outfit',sans-serif;line-height:1">0</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:3px;margin-top:6px">/ 100</span>
        </div>
      </div>
      <div class="stats-col">
        <div class="stat-card"><div class="val">${scores.followers.toLocaleString()}</div><div class="lbl">Followers</div></div>
        <div class="stat-card"><div class="val">${scores.tweets.toLocaleString()}</div><div class="lbl">Tweets</div></div>
        <div class="stat-card"><div class="val">${scores.sorsaScore}</div><div class="lbl">Sorsa Score</div></div>
      </div>
    </div>

    <div class="breakdown">
      <div class="section-title">SCORE BREAKDOWN</div>
      ${METRICS.map((m, i) => {
        const v = scores[m.key];
        const c = getColor(v);
        return `<div class="metric" id="m${i}">
          <div class="row">
            <span class="label">${m.label}</span>
            <span class="value" style="color:${c}">${v}</span>
          </div>
          <div class="track">
            <div class="fill" id="f${i}" style="background:linear-gradient(90deg,${c}30,${c});box-shadow:0 0 10px ${c}35"></div>
          </div>
          <div class="desc">${m.desc}</div>
        </div>`;
      }).join("")}
    </div>

    <div class="card" style="background:linear-gradient(135deg,${tier.color}06,transparent);border:1px solid ${tier.color}12">
      <div class="section-title">AI ANALYSIS</div>
      <div class="ai-loading" id="aiText">analyzing profile...</div>
    </div>

    <div class="card" style="background:linear-gradient(135deg,${tier.color}06,transparent);border:1px solid ${tier.color}12;text-align:center">
      <div class="section-title">VERDICT</div>
      <div class="verdict-text" style="color:${tier.color}">${getVerdict(scores.overall)}</div>
    </div>

    <div class="footer-label">NFLUENCE — WEB3 KOL MARKETING · SCORE BY SORSA</div>
    <button class="scan-again" onclick="resetScan()">↩ SCAN ANOTHER</button>
  `;

  // Animate ring
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById("scoreRing").style.strokeDashoffset = offset;
    });
  });

  // Animate number
  let current = 0;
  const step = Math.max(1, Math.ceil(scores.overall / 60));
  const iv = setInterval(() => {
    current = Math.min(current + step, scores.overall);
    document.getElementById("animScore").textContent = current;
    if (current >= scores.overall) clearInterval(iv);
  }, 16);

  // Animate metric bars
  METRICS.forEach((_, i) => {
    setTimeout(() => {
      const el  = document.getElementById(`m${i}`);
      const fill = document.getElementById(`f${i}`);
      if (el)   el.classList.add("visible");
      if (fill) fill.style.width = `${scores[METRICS[i].key]}%`;
    }, i * 120 + 300);
  });
}

// --- AI Analysis (hits our own backend, no CORS issues) ---
async function fetchAiAnalysis(handle, scores, sorsaRaw) {
  const el = document.getElementById("aiText");
  if (!el) return;

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ handle, scores, sorsaRaw }),
    });

    if (!res.ok) throw new Error("analyze failed");
    const data = await res.json();
    if (el) {
      el.className = "ai-text";
      el.textContent = data.analysis || "could not generate analysis.";
    }
  } catch {
    if (el) el.textContent = "could not generate AI analysis.";
  }
}

function resetScan() {
  hide("results");
  const input = document.getElementById("handleInput");
  input.value = "";
  input.focus();
}
</script>
</body>
</html>
